<svg width="900" height="700" xmlns="http://www.w3.org/2000/svg">
  <style>
    .box { fill: none; stroke: black; stroke-width: 1.5; }
    .text { font-family: Arial, sans-serif; font-size: 12px; text-anchor: middle; }
    .title { font-weight: bold; }
    .arrow { stroke: black; stroke-width: 1.2; marker-end: url(#arrowhead); }
  </style>

  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="black"></polygon>
    </marker>
  </defs>

  <!-- Load Generator -->
  <rect x="325" y="30" width="250" height="60" class="box"></rect>
  <text x="450" y="55" class="text title">Load Generator</text>
  <text x="450" y="75" class="text">(Client / Benchmark)</text>

  <!-- Split arrows -->
  <line x1="450" y1="90" x2="450" y2="120" class="arrow"></line>
  <line x1="450" y1="120" x2="250" y2="160" class="arrow"></line>
  <line x1="450" y1="120" x2="650" y2="160" class="arrow"></line>

  <!-- REST Service -->
  <rect x="150" y="160" width="200" height="120" class="box"></rect>
  <text x="250" y="180" class="text title">REST Service</text>
  <text x="250" y="200" class="text">HTTP/1.1</text>
  <text x="250" y="220" class="text">JSON</text>
  <text x="250" y="240" class="text">Go Microservice</text>

  <!-- gRPC Service -->
  <rect x="550" y="160" width="200" height="120" class="box"></rect>
  <text x="650" y="180" class="text title">gRPC Service</text>
  <text x="650" y="200" class="text">HTTP/2</text>
  <text x="650" y="220" class="text">Protobuf</text>
  <text x="650" y="240" class="text">Go Microservice</text>

  <!-- Arrows down -->
  <line x1="250" y1="280" x2="250" y2="320" class="arrow"></line>
  <line x1="650" y1="280" x2="650" y2="320" class="arrow"></line>

  <!-- AWS VPC -->
  <rect x="150" y="320" width="600" height="80" class="box"></rect>
  <text x="450" y="350" class="text title">AWS VPC (Private Network)</text>
  <text x="450" y="370" class="text">Isolated EC2 Instances (No Internet)</text>

  <!-- Arrow to Metrics -->
  <line x1="450" y1="400" x2="450" y2="440" class="arrow"></line>

  <!-- Metrics -->
  <rect x="300" y="440" width="300" height="120" class="box"></rect>
  <text x="450" y="460" class="text title">Metrics &amp; Monitoring</text>
  <text x="450" y="485" class="text">Latency (p50 / p95 / p99)</text>
  <text x="450" y="505" class="text">Throughput (req/sec)</text>
  <text x="450" y="525" class="text">CPU / Memory Utilization</text>

  <!-- Arrow to Analysis -->
  <line x1="450" y1="560" x2="450" y2="600" class="arrow"></line>

  <!-- Analysis -->
  <rect x="325" y="600" width="250" height="60" class="box"></rect>
  <text x="450" y="625" class="text title">Data Analysis</text>
  <text x="450" y="645" class="text">(Comparison &amp; Evaluation)</text>

</svg>